<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover + the safe-area insets in mobile.css let the UI run
         under the notch and gesture bar instead of being letterboxed.
         user-scalable=no: this is an app, not a document — pinch-zoom on a
         player is always an accident. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Fix Spotify</title>
    <!-- No Google Fonts link, unlike the desktop index.html: the phone is often
         offline and a blocking font fetch would stall first paint. System fonts
         (Roboto on Android) are used instead — see mobile.css. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%231ed760'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/mobile/main.jsx"></script>
  </body>
</html>
