name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.1). Leave empty to use branch name."
        required: false

# Cancel previous runs for the same ref (saves CI minutes on rapid re-tags).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # needed for creating releases

jobs:
  build:
    runs-on: windows-latest
    steps:
      # ─── Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Resolve version tag ─────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.tag_name }}" ]]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="dev-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $TAG"

      # Bake the tag's version into tauri.conf.json so the BUILT .exe reports the
      # same version the release advertises. Without this the app is compiled with
      # whatever static version is in the file, so it can report an older version
      # than latest.json forever — the endless "update available" loop. latest.json
      # already derives its version from the tag, so after this both agree.
      - name: Set app version from tag
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}".TrimStart('v')
          if ($tag -match '^\d+\.\d+\.\d+') {
            $conf = "frontend/src-tauri/tauri.conf.json"
            $json = Get-Content $conf -Raw | ConvertFrom-Json
            $json.version = $tag
            $json | ConvertTo-Json -Depth 30 | Out-File -Encoding utf8 $conf
            Write-Host "tauri.conf.json version set to $tag"
          } else {
            Write-Host "Non-semver tag '$tag' — keeping tauri.conf.json version"
          }

      # ─── Python backend (PyInstaller sidecar) ───────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pyinstaller

      - name: Build Python backend
        run: pyinstaller backend.spec --clean --noconfirm

      - name: Copy sidecar to Tauri
        run: |
          Copy-Item "dist/backend.exe" "frontend/src-tauri/backend-x86_64-pc-windows-msvc.exe"

      # ─── Vendor binaries (FFmpeg + Deno) ─────────────────────────────
      - name: Download FFmpeg (shared build)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "vendor/bin" | Out-Null
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Write-Host "Downloading FFmpeg from $url"
          Invoke-WebRequest -Uri $url -OutFile "ffmpeg.zip" -MaximumRetryCount 3
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-tmp" -Force
          # The archive has a single top-level dir; copy bin/* to vendor/bin/
          $binDir = Get-ChildItem "ffmpeg-tmp" -Directory | Select-Object -First 1
          Copy-Item "$($binDir.FullName)/bin/*" "vendor/bin/" -Force
          Remove-Item "ffmpeg.zip", "ffmpeg-tmp" -Recurse -Force
          Write-Host "FFmpeg installed:"
          & "vendor/bin/ffmpeg.exe" -version | Select-Object -First 1

      - name: Download Deno
        shell: pwsh
        run: |
          $url = "https://github.com/denoland/deno/releases/latest/download/deno-x86_64-pc-windows-msvc.zip"
          Write-Host "Downloading Deno from $url"
          Invoke-WebRequest -Uri $url -OutFile "deno.zip" -MaximumRetryCount 3
          Expand-Archive -Path "deno.zip" -DestinationPath "vendor/bin" -Force
          Remove-Item "deno.zip" -Force
          Write-Host "Deno installed:"
          & "vendor/bin/deno.exe" --version

      # ─── Frontend (Node + Tauri build) ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: rust-${{ runner.os }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      # Signing produces the .sig the desktop updater verifies. The key MUST be a
      # single base64 line: a trailing newline (e.g. from `cat key | clip`) makes
      # tauri fail with "failed to decode base64 key: Invalid symbol 10" (10 is
      # '\n'). So strip ALL whitespace from the key — base64 has none — and only
      # then sign. With no key at all, build UNSIGNED (updater artifacts off) so
      # the release still publishes the .exe.
      - name: Prepare updater signing key
        id: signing
        shell: bash
        run: |
          KEY=$(printf '%s' "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | tr -d '[:space:]')
          PW=$(printf '%s' "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" | tr -d '\r\n')
          if [ -n "$KEY" ]; then
            echo "::add-mask::$KEY"
            [ -n "$PW" ] && echo "::add-mask::$PW"
            echo "key=$KEY" >> "$GITHUB_OUTPUT"
            echo "pw=$PW" >> "$GITHUB_OUTPUT"
            echo "have_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No TAURI_SIGNING_PRIVATE_KEY set — building UNSIGNED. The desktop auto-update (latest.json) will be skipped for this release."
          fi

      - name: Build Tauri app (signed)
        if: steps.signing.outputs.have_key == 'true'
        working-directory: frontend
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing.outputs.key }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ steps.signing.outputs.pw }}

      - name: Build Tauri app (unsigned)
        if: steps.signing.outputs.have_key == 'false'
        working-directory: frontend
        # Turn off updater artifacts so the build doesn't demand a signing key.
        run: npm run tauri build -- --config "{\"bundle\":{\"createUpdaterArtifacts\":false}}"

      # ─── Publish release ─────────────────────────────────────────────
      - name: Find installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem "frontend/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Write-Host "Found installer: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 2)) MB)"
          "path=$($exe.FullName)" | Out-File -Append $env:GITHUB_OUTPUT
          "name=$($exe.Name)" | Out-File -Append $env:GITHUB_OUTPUT

      # The update feed. Installed apps poll this file, verify its signature, and
      # offer the new version — so users never hand-download an installer again.
      - name: Build update manifest (latest.json)
        id: manifest
        shell: pwsh
        run: |
          $sigFile = Get-ChildItem "frontend/src-tauri/target/release/bundle/nsis/*.sig" | Select-Object -First 1
          if (-not $sigFile) {
            Write-Host "::warning::No .sig produced — TAURI_SIGNING_PRIVATE_KEY is not set, skipping latest.json"
            "created=false" | Out-File -Append $env:GITHUB_OUTPUT
            exit 0
          }
          $sig = Get-Content $sigFile.FullName -Raw
          $tag = "${{ steps.version.outputs.tag }}"
          $exeName = "${{ steps.installer.outputs.name }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/$exeName"

          $manifest = [ordered]@{
            version   = $tag.TrimStart('v')
            notes     = "See the release notes on GitHub."
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $sig.Trim(); url = $url }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Out-File -Encoding utf8 latest.json
          Write-Host "latest.json written for $tag"
          "created=true" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Fix_Spotify ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.installer.outputs.path }}
            ${{ steps.manifest.outputs.created == 'true' && 'latest.json' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
