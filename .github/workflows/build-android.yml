name: Build Android APK

# Ships the Android APK. A version tag (v*) builds it and attaches it to the
# SAME GitHub Release that build-release.yml creates for the Windows .exe, so a
# single tag produces both installers. workflow_dispatch builds an APK you can
# download straight from the run's Artifacts, without cutting a release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to attach the APK to the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 — required by Android Gradle Plugin 8.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Node builds the mobile React bundle (frontend/dist-mobile).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Python 3.11 = Chaquopy's "buildPython". The runner's own Python may be
      # newer, so pin it to match the interpreter bundled into the APK.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build mobile web bundle
        working-directory: frontend
        run: |
          npm ci
          npm run build:mobile

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      # Sign with the REAL release key so the APK can update an existing install
      # in place (keeping the user's playlists/likes/history). Without these
      # secrets the build falls back to the debug key — fine for a test build,
      # but such an APK cannot update a properly-signed one.
      #
      # Set them up once:
      #   base64 -w0 mobile/android/app/fixspotify-release.jks   -> ANDROID_KEYSTORE_B64
      #   the store/key password                                 -> ANDROID_KEYSTORE_PASSWORD
      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_B64 secret — falling back to the debug key."
            echo "This APK will NOT be able to update a properly-signed install."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > mobile/android/app/fixspotify-release.jks
          cat > mobile/android/app/keystore.properties <<EOF
          storeFile=fixspotify-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=fixspotify
          keyPassword=$KEYSTORE_PASSWORD
          EOF
          echo "Release keystore restored — APK will be update-compatible."

      # ANDROID_HOME is preinstalled on ubuntu-latest, so Gradle finds the SDK
      # with no local.properties needed.
      - name: Build release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        id: stage
        run: |
          SRC=mobile/android/app/build/outputs/apk/release/app-release.apk
          DEST="Fix_Spotify_${GITHUB_REF_NAME}.apk"
          # Fall back to a stable name on workflow_dispatch (ref is a branch).
          case "$GITHUB_REF_NAME" in v*) ;; *) DEST="Fix_Spotify.apk" ;; esac
          cp "$SRC" "$DEST"
          echo "apk=$DEST" >> "$GITHUB_OUTPUT"

      # Manual runs: grab the APK from the run's Artifacts tab.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fix_Spotify-apk
          path: ${{ steps.stage.outputs.apk }}
          if-no-files-found: error

      # Tag builds: attach the APK to the release for that tag (creating it if
      # the desktop job hasn't yet — the two jobs converge on the same release).
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.apk }}
          fail_on_unmatched_files: true
