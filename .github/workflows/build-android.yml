name: Build Android APK

# Ships the Android APK. A version tag (v*) builds it and attaches it to the
# SAME GitHub Release that build-release.yml creates for the Windows .exe, so a
# single tag produces both installers. workflow_dispatch builds an APK you can
# download straight from the run's Artifacts, without cutting a release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp, e.g. 1.3.0-rc1. Must be HIGHER than the version already on the phone, or Android refuses to install over it (a downgrade needs an uninstall, which wipes the library)."
        required: false
        default: "1.3.0-rc1"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to attach the APK to the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 — required by Android Gradle Plugin 8.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Node builds the mobile React bundle (frontend/dist-mobile).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Python 3.11 = Chaquopy's "buildPython". The runner's own Python may be
      # newer, so pin it to match the interpreter bundled into the APK.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build mobile web bundle
        working-directory: frontend
        run: |
          npm ci
          npm run build:mobile

      - name: Make gradlew executable
        run: chmod +x mobile/android/gradlew

      # Sign with the REAL release key so the APK can update an existing install
      # in place (keeping the user's playlists/likes/history). Without these
      # secrets the build falls back to the debug key — fine for a test build,
      # but such an APK cannot update a properly-signed one.
      #
      # Set them up once:
      #   base64 -w0 mobile/android/app/fixspotify-release.jks   -> ANDROID_KEYSTORE_B64
      #   the store/key password                                 -> ANDROID_KEYSTORE_PASSWORD
      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Strip whitespace the secrets may carry (a trailing newline from
          # `cat file | clip` is common and silently corrupts both the base64
          # keystore and the password). base64 is whitespace-free; the store
          # password 'fixspotify' has none either, so this only removes noise.
          KEYSTORE_B64=$(printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]')
          KEYSTORE_PASSWORD=$(printf '%s' "$KEYSTORE_PASSWORD" | tr -d '\r\n')
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::No ANDROID_KEYSTORE_B64 secret — falling back to the debug key."
            echo "This APK will NOT be able to update a properly-signed install."
            exit 0
          fi
          printf '%s' "$KEYSTORE_B64" | base64 -d > mobile/android/app/fixspotify-release.jks
          cat > mobile/android/app/keystore.properties <<EOF
          storeFile=fixspotify-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=fixspotify
          keyPassword=$KEYSTORE_PASSWORD
          EOF
          echo "Release keystore restored — APK will be update-compatible."

      # ANDROID_HOME is preinstalled on ubuntu-latest, so Gradle finds the SDK
      # with no local.properties needed.
      #
      # The APK's versionName is DERIVED FROM THE TAG (v1.2.2 -> 1.2.2), passed
      # to Gradle as -PappVersionName. This is what stops the tag and the built
      # version from ever disagreeing (the cause of the endless-update loop).
      #
      # On workflow_dispatch there is no tag, so the version comes from the run's
      # `version` input instead. It used to fall through to build.gradle's local
      # fallback (1.2.1), which made every test APK a DOWNGRADE against a phone
      # already on a later release — Android refuses to install those over the top,
      # so the only way in was an uninstall, which wipes the user's library. An
      # explicit input keeps test builds installable.
      - name: Build release APK
        working-directory: mobile/android
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION_ARG=""
          case "$GITHUB_REF_NAME" in
            v*) VERSION_ARG="-PappVersionName=${GITHUB_REF_NAME#v}" ;;
          esac
          if [ -n "$INPUT_VERSION" ]; then
            VERSION_ARG="-PappVersionName=$INPUT_VERSION"
          fi
          echo "Building with ${VERSION_ARG:-(local fallback version)}"
          ./gradlew assembleRelease --no-daemon --stacktrace $VERSION_ARG

      - name: Stage APK
        id: stage
        run: |
          SRC=mobile/android/app/build/outputs/apk/release/app-release.apk
          DEST="Fix_Spotify_${GITHUB_REF_NAME}.apk"
          # Fall back to a stable name on workflow_dispatch (ref is a branch).
          case "$GITHUB_REF_NAME" in v*) ;; *) DEST="Fix_Spotify.apk" ;; esac
          cp "$SRC" "$DEST"
          echo "apk=$DEST" >> "$GITHUB_OUTPUT"

      # Manual runs: grab the APK from the run's Artifacts tab.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fix_Spotify-apk
          path: ${{ steps.stage.outputs.apk }}
          if-no-files-found: error

      # Tag builds: attach the APK to the release for that tag (creating it if
      # the desktop job hasn't yet — the two jobs converge on the same release).
      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # Name it the same as the desktop job does. Whichever job gets there
          # first creates the release, and without this the Android job named it
          # after the bare tag ("v1.2.0") instead of "Fix_Spotify v1.2.0".
          name: "Fix_Spotify ${{ github.ref_name }}"
          files: ${{ steps.stage.outputs.apk }}
          fail_on_unmatched_files: true
